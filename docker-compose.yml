services:
  backend:
    build:
      context: ./backend/backend
    ports:
      - "8088:8080"
    environment:
      - SPRING_DATASOURCE_LOCAL_URL=jdbc:postgresql://postgres:5432/backend_stats
      - SPRING_DATASOURCE_LOCAL_USERNAME=postgres
      - SPRING_DATASOURCE_LOCAL_PASSWORD=root
    depends_on:
      - postgres

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: backend_stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "88:80"
    depends_on:
      - backend

volumes:
  pgdata: